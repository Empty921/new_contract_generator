services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: docs-app
    restart: unless-stopped
    working_dir: /var/www/app
    volumes:
      - .:/var/www/app
      # vendor/ has thousands of small files; reading it through the Windows
      # bind-mount on every PHP autoload made every request take 5-10s even
      # for a no-op endpoint. A named volume lives on the VM's native fs instead.
      - vendor_data:/var/www/app/vendor
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=docs_db
      - DB_USERNAME=docs_user
      - DB_PASSWORD=docs_password
    command: bash docker/entrypoint.sh

  db:
    image: postgres:15-alpine
    container_name: docs-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=docs_db
      - POSTGRES_USER=docs_user
      - POSTGRES_PASSWORD=docs_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docs_user -d docs_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  vendor_data:
